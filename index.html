<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
        <title>Frontend Mentor | Blog preview card</title>

<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            .attribution { font-size: 0.6875rem; text-align: center; }
            .attribution a { color: hsl(228, 45%, 44%); }
        </style>
    </head>
    <body>
        <main class="main-card">
            <figure class="ilustration-container">
                <img class="ilustration-img" src="assets/images/illustration-article.svg" alt="">
            </figure>

            <span class="learning">Learning</span>

            <time class="datetime" datetime="2023-12-21">Published 21 Dec 2023</time>

                <h1>HTML & CSS foundations</h1>    
                <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
                
            <figure class="avatar-container">
                <img class="avatar-img" src="assets/images/image-avatar.webp" alt="Avatar de Greg Hooper">
                <figcaption>Greg Hooper</figcaption>
            </figure>
        </main>
        <footer class="attribution">Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Calceto</a>.
        </footer>
    </body>
</html>
